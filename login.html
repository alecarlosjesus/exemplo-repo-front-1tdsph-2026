<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESPORTE TOTAL - LOGIN</title>
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body>
    <header class="cabecalho">
      <nav class="cabecalho__navbar">
        <ul class="cabecalho__lista">
          <li class="cabecalho__list-item">
            <a
              class="cabecalho_link cabecalho_link--active"
              href="./index.html"
              >Home</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main class="conteudo">
      <section class="hero">
        <div class="hero__container">
          <h1 class="hero__title">CONTROLE DE ACESSO</h1>

          <form action="#" method="GET">
            <fieldset>
              <legend>Login</legend>
              <div>
                <label for="idEmail">Email</label>
                <input
                  type="email"
                  name="email"
                  id="idEmail"
                  placeholder="Digite seu email"
                  minlength="13"
                  maxlength="150"
                  required
                  oninvalid="setCustomValidity"(Existem erros no campo ${this.name}.)"
                />
              </div>
              <div>
                <label for="idSenha">Senha</label>
                <input
                  type="password"
                  name="senha"
                  id="idSenha"
                  placeholder="Digite sua senha"
                  minlength="5"
                  maxlength="30"
                  required
                  oninvalid="setCustomValidity"(Existem erros no campo ${this.name}.)"
                />
              </div>
              <div>
                <button type="submit" id="btnEntrar">Entrar</button>
            </div>
            </fieldset>
          </form>

          <span>Não tem uma conta?</span
          ><a
            aria-label="Para criar uma conta"
            class="hero__btn"
            href="./cadastro.html"
            >clique aqui</a
          >
        </div>
      </section>
    </main>

    <footer>
      <p class="unico">ESPORTE TOTAL &copy; - Todos os direitos reservados</p>
    </footer>

  </body>
</html>
